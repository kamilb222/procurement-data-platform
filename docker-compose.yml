services:
  postgres:
    image: postgres:16-alpine
    container_name: pdp_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pdp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pdp}
      POSTGRES_DB: ${POSTGRES_DB:-pdp}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pdp_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pdp} -d ${POSTGRES_DB:-pdp}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pdp_pgdata:
