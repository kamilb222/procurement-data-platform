name: CI

on:
  # push only on main: a feature branch with an open PR is already covered by
  # the pull_request trigger, so restricting push here stops the same commit
  # from running CI twice (once for push, once for pull_request). Feature
  # branches get CI as soon as a PR is opened; merges to main re-run it.
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs when a PR is updated with a rapid second push.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --all-groups --frozen

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Run tests
        run: uv run pytest
